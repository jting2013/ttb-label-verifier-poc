services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env.example
    environment:
      DATABASE_URL: sqlite:////app/data/ttb_label_review.db
      EXPECTED_DATA_PATH: /app/sample_data/expected/mock_applications.json
      OCR_ENGINE: ${OCR_ENGINE:-tesseract}
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
      - ./sample_data:/app/sample_data:ro
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: ""
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  backend_data:
  backend_uploads:
